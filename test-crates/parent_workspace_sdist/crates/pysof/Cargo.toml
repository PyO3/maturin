[workspace]
members = ["."]
resolver = "2"

[package]
name = "pysof"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
pyo3 = { git = "https://github.com/ngoldbaum/pyo3", branch = "opaque-pyobject", features = ["extension-module"] }
shared_crate = { path = "../shared_crate" }
